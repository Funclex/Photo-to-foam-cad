<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to Foam Packaging CAD | CNC DXF</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-4">Photo to Foam Packaging CAD</h1>
        <p class="text-sm text-gray-600 mb-4 text-center">
            Put a <strong>1-inch coin (25.4mm)</strong> next to your product<br>
            Auto generate CNC foam DXF file
        </p>

        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <label for="fileInput" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center py-3 rounded-lg cursor-pointer transition">
            Select Product Photo
        </label>

        <div id="previewArea" class="mt-4 hidden">
            <img id="previewImg" class="w-full h-auto rounded-lg border">
        </div>

        <button id="submitBtn" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            Generate DXF CAD
        </button>

        <div id="status" class="mt-3 text-sm text-center"></div>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const previewArea = document.getElementById("previewArea");
        const previewImg = document.getElementById("previewImg");
        const submitBtn = document.getElementById("submitBtn");
        const status = document.getElementById("status");
        let selectedFile = null;

        fileInput.addEventListener("change", e => {
            selectedFile = e.target.files[0];
            if(!selectedFile) return;
            const reader = new FileReader();
            reader.onload = ev => {
                previewImg.src = ev.target.result;
                previewArea.classList.remove("hidden");
                submitBtn.disabled = false;
                status.innerText = "";
            };
            reader.readAsDataURL(selectedFile);
        });

        submitBtn.addEventListener("click", async () => {
            if(!selectedFile) return;
            status.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
                const res = await fetch("/upload", { method:"POST", body:formData });
                const json = await res.json().catch(()=>null);
                if(!res.ok) throw new Error(json?.error || "Server error");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "foam_pack.dxf";
                a.click();
                URL.revokeObjectURL(url);
                status.innerText = "✅ DXF downloaded successfully";
            } catch(err) {
                status.innerText = "❌ " + err.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
